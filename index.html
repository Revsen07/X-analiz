<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Görsel Analiz Yerel</title>
  <style>
    body { font-family: Arial, sans-serif; max-width:800px; margin:40px auto; }
    input[type=file]{ display:block; margin-top:10px; }
    textarea{ width:100%; height:80px; margin-top:8px; }
    button{ padding:10px 16px; margin-top:8px; }
    pre{ background:#f4f4f4; padding:12px; white-space:pre-wrap; }
    img.preview{ max-width:300px; display:block; margin-top:12px; }
  </style>
</head>
<body>
  <h2>Görsel Analiz Yerel</h2>
  <p>Bilgisayarından bir görsel seç ve analiz et. Model olarak <strong>nvidia/nemotron-3-ultra-550b-a55b:free</strong> kullanılacak.</p>

  <form id="frm" enctype="multipart/form-data">
    <input type="file" id="image" name="image" accept="image/png,image/jpeg,image/webp" />
    <label for="prompt">İsteğe bağlı ek talimat (kısa)</label>
    <textarea id="prompt" name="prompt" placeholder="Analiz için özel bir istek yazabilirsiniz"></textarea>
    <button type="submit">Analiz Et</button>
  </form>

  <h3>Önizleme</h3>
  <img id="preview" class="preview" src="" alt="" style="display:none" />

  <h3>Sonuç</h3>
  <div id="result"></div>

  <script>
    const imageInput = document.getElementById("image");
    const preview = document.getElementById("preview");
    imageInput.addEventListener("change", () => {
      const f = imageInput.files[0];
      if(!f){ preview.style.display = "none"; return; }
      const url = URL.createObjectURL(f);
      preview.src = url;
      preview.style.display = "block";
    });

    document.getElementById("frm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const f = imageInput.files[0];
      if(!f){ alert("Lütfen bir görsel seçin."); return; }
      document.getElementById("result").innerText = "İşleniyor...";
      const form = new FormData();
      form.append("image", f);
      form.append("prompt", document.getElementById("prompt").value);

      try {
        const res = await fetch("/analyze", { method: "POST", body: form });
        const data = await res.json();
        if(!res.ok){
          document.getElementById("result").innerText = "Hata: " + JSON.stringify(data, null, 2);
          return;
        }
        let out = "";
        out += "Dosya: " + data.filename + "\n";
        out += "Model: " + data.model_used + "\n\n";
        out += "Analiz:\n" + data.analysis;
        document.getElementById("result").innerText = out;
      } catch (err) {
        document.getElementById("result").innerText = "İstek hatası: " + err;
      }
    });
  </script>
</body>
</html>
